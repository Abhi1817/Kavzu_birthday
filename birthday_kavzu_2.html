<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Happy Birthday Kavzu 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--rose:#c0475a;--rose-light:#e8899a;--rose-pale:#fdf0f2;--gold:#c9a84c;--gold-light:#f0d080;--cream:#fdf6ef;--dark:#1a1014;--text:#3d2030;--muted:#7a5060;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);}

#enter-btn{margin-top:1.8rem;padding:0.95rem 3rem;background:var(--rose);color:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.95rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;animation:fadeUp 0.6s forwards;}

.testing-badge{position:fixed;top:1rem;left:1rem;background:rgba(255,0,0,0.8);color:white;padding:0.5rem 1rem;border-radius:4px;font-size:0.9rem;z-index:9999;font-weight:bold;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="testing-badge">🧪 TESTING - Enter Button Always Visible & Scrolling Enabled</div>

<script>
// Enable scrolling immediately for testing
document.body.style.overflow = 'auto';
console.log('Testing branch: Enter button visible and scrolling enabled from start');
</script>

</body>
</html>
